<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1419" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon.svg" />
<title>Riftbound Offline Card DB</title>
<style>
  /* Display face: Chakra Petch — angular techno-serif, self-hosted (latin subset)
     so the offline PWA keeps its identity with no network. Body stays system-ui. */
  @font-face {
    font-family: "Chakra Petch"; font-style: normal; font-weight: 500; font-display: swap;
    src: url("./fonts/chakra-petch-500.woff2") format("woff2");
  }
  @font-face {
    font-family: "Chakra Petch"; font-style: normal; font-weight: 700; font-display: swap;
    src: url("./fonts/chakra-petch-700.woff2") format("woff2");
  }
  :root {
    /* "Rift" base — cool near-black with a faint violet undertone, not flat slate. */
    --bg: #0c0d14; --panel: #15161f; --panel-2: #1d1f2b; --line: #2c2f3e;
    --text: #eef0f6; --muted: #a7adbe; --gold: #e7c66b; --accent: #5ab0ec;
    /* The seven domains, as their real Riftbound color identities. These are the
       page's palette — used semantically (pills, card edge, filter chips), the
       single source of truth lives in app.js DOMAIN_COLORS and mirrors these. */
    --d-body: #f0934e; --d-calm: #5fcf80; --d-chaos: #bd71ec; --d-fury: #ef5a52;
    --d-mind: #5ab0ec; --d-order: #e7c66b; --d-colorless: #9aa6bb;
    --display: "Chakra Petch", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  body { background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(189,113,236,.07), transparent 60%),
    radial-gradient(900px 500px at 0% 0%, rgba(90,176,236,.06), transparent 55%); }
  a { color: var(--accent); }

  header {
    position: sticky; top: 0; z-index: 20; background: rgba(12,13,20,.92);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filters { margin-top: 9px; }
  .brand { font-family: var(--display); font-weight: 700; font-size: 17px;
    text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap;
    color: var(--text); display: inline-flex; align-items: baseline; gap: 7px; }
  .brand .rb { color: var(--gold); }
  .brand small { font-family: system-ui; color: var(--muted); font-weight: 400;
    font-size: 12px; letter-spacing: 0; text-transform: none; }
  input[type=search], select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font-size: 14px; outline: none;
  }
  input[type=search] { flex: 1 1 220px; min-width: 0; }
  input[type=search]:focus, select:focus { border-color: var(--accent); }
  select { flex: 0 1 auto; }
  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
  }
  button.primary { background: var(--gold); color: #1a1206; border-color: var(--gold); font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Domain filter — a row of colored crystals; the signature control. Toggling
     one tints the whole result set, making the game's color language the way you
     navigate. Single-select (radio-like) to match the other filters. */
  .domains { display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .dchip {
    --dc: var(--muted);
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 5px 11px 5px 9px; font-size: 12.5px;
    font-family: var(--display); font-weight: 500; letter-spacing: .4px;
    transition: color .12s, border-color .12s, background .12s;
  }
  .dchip::before {
    content: ""; width: 9px; height: 9px; border-radius: 2px; transform: rotate(45deg);
    background: var(--dc); box-shadow: 0 0 6px -1px var(--dc);
  }
  .dchip:hover { color: var(--text); border-color: var(--dc); }
  .dchip[aria-pressed="true"] {
    color: #0c0d14; background: var(--dc); border-color: var(--dc); font-weight: 700;
  }
  .dchip[aria-pressed="true"]::before { background: #0c0d14; box-shadow: none; }

  .statusbar { color: var(--muted); font-size: 12.5px; margin-top: 8px; display: flex;
    gap: 12px; flex-wrap: wrap; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.ok { background: #3fb950; } .dot.warn { background: #d29922; } .dot.off { background: var(--muted); }
  .statusbar .ver { margin-left: auto; font-family: var(--display); color: var(--muted);
    opacity: .8; letter-spacing: .3px; }

  /* Update toast: shown when the service worker detects a newer build. */
  .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 50;
    display: flex; align-items: center; gap: 12px; padding: 10px 12px 10px 16px;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.45); font-size: 13.5px; }
  .toast button { padding: 6px 12px; }

  main { padding: 16px 14px; }
  .grid {
    display: grid; gap: 13px;
    grid-template-columns: repeat(auto-fill, minmax(154px, 1fr));
  }
  .card {
    --dc: var(--line);
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-top: 2px solid var(--dc); border-radius: 10px;
    overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
    transition: transform .1s ease, border-color .1s ease, box-shadow .1s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--dc);
    box-shadow: 0 6px 22px -10px var(--dc), 0 0 0 1px var(--dc); }
  .card:hover .nm { color: #fff; }
  .thumb { position: relative; aspect-ratio: 744 / 1039; background: var(--panel-2);
    display: flex; align-items: center; justify-content: center; }
  .thumb.landscape { aspect-ratio: 1039 / 744; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .thumb .ph { padding: 10px; text-align: center; color: var(--muted); font-size: 12px; }
  /* Energy cost as a corner rune-crystal — only units/spells carry one. */
  .energy {
    position: absolute; top: 7px; left: 7px; z-index: 1; min-width: 22px; height: 22px;
    padding: 0 5px; display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--display); font-weight: 700; font-size: 12.5px; color: var(--text);
    background: rgba(12,13,20,.82); border: 1px solid var(--line); border-radius: 6px;
    backdrop-filter: blur(2px); }
  .card .meta { padding: 9px 10px; }
  .card .nm { font-family: var(--display); font-weight: 500; font-size: 13px;
    line-height: 1.15; letter-spacing: .2px; transition: color .1s; }
  .card .sub { color: var(--muted); font-size: 11.5px; margin-top: 4px; }
  .pills { margin-top: 5px; }
  .pill { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    border: 1px solid currentColor; background: color-mix(in srgb, currentColor 12%, transparent);
    margin: 3px 3px 0 0; font-weight: 600; letter-spacing: .3px; }

  .empty { color: var(--muted); text-align: center; padding: 60px 20px; }

  /* Modal */
  dialog { border: none; background: transparent; padding: 0; max-width: 96vw; max-height: 96vh; }
  dialog::backdrop { background: rgba(6,7,11,.78); backdrop-filter: blur(2px); }
  .modal { --dc: var(--gold); background: var(--panel); border: 1px solid var(--line);
    border-top: 3px solid var(--dc); border-radius: 14px;
    width: min(860px, 96vw); max-height: 92vh; overflow: auto; display: grid;
    grid-template-columns: minmax(0, 320px) 1fr; gap: 0; }
  @media (max-width: 640px) { .modal { grid-template-columns: 1fr; } }
  .modal .art { background: var(--panel-2); padding: 16px; display: flex; align-items: flex-start;
    justify-content: center; }
  .modal .art img { width: 100%; border-radius: 8px; }
  .modal .art .ph { color: var(--muted); text-align: center; padding: 30px 10px; }
  .modal .body { padding: 18px 20px; }
  .modal h2 { font-family: var(--display); font-weight: 700; margin: 0 0 3px;
    color: var(--text); font-size: 22px; letter-spacing: .3px; }
  .modal .code { font-family: var(--display); color: var(--muted); font-size: 12px;
    letter-spacing: .5px; }
  .modal .rules { white-space: pre-wrap; margin: 14px 0; padding: 12px 13px; background: var(--panel-2);
    border-radius: 8px; border: 1px solid var(--line); border-left: 3px solid var(--dc);
    color: var(--text); line-height: 1.5; }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; font-size: 13.5px; }
  .kv dt { color: var(--muted); font-family: var(--display); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: .6px; align-self: center; }
  .kv dd { margin: 0; color: var(--text); }
  .close { position: sticky; top: 8px; float: right; margin: 8px; z-index: 2; }

  .progress { height: 6px; background: var(--panel-2); border-radius: 999px; overflow: hidden;
    flex: 1 1 120px; max-width: 220px; }
  .progress > i { display: block; height: 100%; background: var(--gold); width: 0; transition: width .2s; }

  /* Mobile: search takes the full row, the three selects split it evenly so
     each is a comfortable tap target instead of shrinking to its label. */
  @media (max-width: 560px) {
    .filters { gap: 8px; }
    input[type=search] { flex: 1 1 100%; }
    .filters select { flex: 1 1 0; min-width: 0; padding: 10px 8px; font-size: 15px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    .card:hover { transform: none; }
  }
</style>
</head>
<body>
<header>
  <div class="row brandrow">
    <span class="brand"><span class="rb">RIFTBOUND</span> Codex <small id="count"></small></span>
  </div>
  <div class="row filters">
    <input id="q" type="search" placeholder="Search name, text, tag, code…" autocomplete="off" />
    <select id="fSet"><option value="">All sets</option></select>
    <select id="fType"><option value="">All types</option></select>
    <select id="fRarity"><option value="">All rarities</option></select>
  </div>
  <div class="domains" id="fDomain" role="group" aria-label="Filter by domain"></div>
  <div class="statusbar">
    <span id="netState"><span class="dot off"></span>…</span>
    <span id="genState"></span>
    <span id="freshState"></span>
    <button id="imgBtn">Download images for offline</button>
    <div class="progress" id="imgProg" hidden><i></i></div>
    <span id="imgState"></span>
    <span id="verState" class="ver"></span>
  </div>
</header>

<div class="toast" id="updateToast" hidden role="status">
  A new version is available.
  <button id="updateBtn" class="primary">Refresh</button>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>No cards match your filters.</div>
</main>

<dialog id="modal"></dialog>

<script src="./version.js"></script>
<script src="./app.js"></script>
<script>
  // Surface the build version in the status bar.
  const VERSION = self.APP_VERSION || "dev";
  document.getElementById("verState").textContent = "v" + VERSION;

  if ("serviceWorker" in navigator) {
    // Register the SW under a version-stamped URL so each build is a distinct
    // worker that installs a fresh shell cache. When a new one is found and
    // finishes installing (while an old one still controls the page), prompt
    // the user to refresh rather than swapping assets out from under them.

    // Reload once the user accepts the update. The fast path is the new
    // worker taking control (skipWaiting + clients.claim → controllerchange),
    // but that event is unreliable across browsers and SW states, so the click
    // also arms a short fallback timer that reloads regardless. Either way we
    // reload exactly once. Gated on updateRequested so the controllerchange
    // from a first install (uncontrolled page → claimed) is ignored.
    let updateRequested = false, refreshing = false;
    const doReload = () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    };
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (updateRequested) doReload();
    });

    window.addEventListener("load", async () => {
      const reg = await navigator.serviceWorker.register("./sw.js?v=" + VERSION);
      const toast = document.getElementById("updateToast");
      const showToast = (worker) => {
        toast.hidden = false;
        document.getElementById("updateBtn").onclick = () => {
          document.getElementById("updateBtn").disabled = true;
          updateRequested = true;
          worker.postMessage("skipWaiting");
          // Fallback: if controllerchange never fires, reload anyway so the
          // button is never a no-op. The new versioned shell is already cached,
          // so a plain reload picks it up even if the worker swap lagged.
          setTimeout(doReload, 1500);
        };
      };
      // An update can already be waiting (installed between visits)...
      if (reg.waiting && navigator.serviceWorker.controller) showToast(reg.waiting);
      // ...or arrive while the page is open.
      reg.addEventListener("updatefound", () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener("statechange", () => {
          if (sw.state === "installed" && navigator.serviceWorker.controller) showToast(sw);
        });
      });
    });
  }
</script>
</body>
</html>

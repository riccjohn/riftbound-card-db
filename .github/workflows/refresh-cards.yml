name: Refresh card data

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest cards
        run: node scripts/fetch-cards.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/data/cards.json; then
            echo "No card changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            COUNT=$(node -e "console.log(require('./public/data/cards.json').count)")
            git add public/data/cards.json
            git commit -m "chore: refresh card data ($COUNT cards)"
            git push
          fi
